<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% if website_return_time %}
    <meta http-equiv="refresh" content="{{ website_return_time }}">
    {% endif %}
    <title>{% block title %}Климат-контроль{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Верхняя панель навигации -->
    <header class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">🌡️ Климат-Контроль</a>
            
            <!-- Выпадающее меню без JS -->
            <div class="dropdown" tabindex="0">
                <button type="button" class="dropdown-btn">Меню ☰</button>
                <div class="dropdown-content">
                    <a href="/" class="dropdown-item">🏠 Главная</a>
                    <a href="/ventilation" class="dropdown-item">💨 Проветривание</a>
                    <a href="/heating" class="dropdown-item">🔥 Отопление</a>
                    <a href="/gas" class="dropdown-item">📟 Учет газа</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Основной контент -->
    <main class="content-container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
